<script>
// --- AUDIO SYNTH GENERATION ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1, slideTo=0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slideTo > 0) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let GROUND = H - 140;

window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    GROUND = H - 140;
});

const CHARS = {
    yuji:      { col: "#ff758f", name: "Yuji Itadori", hasDomain: true, domain: "Benevolent Shrine", m1: "Divergent Fist", m2: "Dismantle" },
    gojo:      { col: "#48cae4", name: "Gojo Satoru", hasDomain: true, domain: "Unlimited Void", m1: "Blue Pull", m2: "Red Repel" },
    sukuna:    { col: "#9b2226", name: "Sukuna", hasDomain: true, domain: "Malevolent Shrine", m1: "Cleave Grid", m2: "Fuga Arrow" },
    ryu:       { col: "#ff5722", name: "Ryu Ishigori", hasDomain: true, domain: "Iron Solitude", m1: "Sweet Discharge", m2: "Granité Blast" },
    mahito:    { col: "#a2d2ff", name: "Mahito", hasDomain: true, domain: "Self-Embodiment", m1: "Soul Hack", m2: "Body Repel" },
    megumi:    { col: "#0f4c5c", name: "Megumi Fushiguro", hasDomain: true, domain: "Chimera Garden", m1: "Divine Dog", m2: "Nue Strike" },
    yuta:      { col: "#e0e1dd", name: "Yuta Okkotsu", hasDomain: true, domain: "Rika Unleashed", m1: "Copy Slate", m2: "Pure Love Burst" },
    nanami:    { col: "#ee9b00", name: "Nanami Kento", hasDomain: false, domain: "Collapse Shift", m1: "7:3 Ratio", m2: "Overtime Rush" },
    nobara:    { col: "#cdb4db", name: "Nobara Kugisaki", hasDomain: false, domain: "Hairpin Requiem", m1: "Resonance Nails", m2: "Hex Collapse" },
    mechamaru:{ col: "#b5838d", name: "Mechamaru", hasDomain: false, domain: "Alchemical Beam", m1: "Ultradrive Beam", m2: "Drone Explosion" },
    inumaki:  { col: "#e9d8a6", name: "Inumaki Toge", hasDomain: false, domain: "Cursed Speech", m1: "Don't Move", m2: "Blast Away" }
};

const ITEMS = {
    none:   { name: "NONE", dName: "NONE", col: "#ffffff" },
    ring:   { name: "RING", dName: "YUTA'S PURE LOVE RING", col: "#ff00cc" },
    staff:  { name: "STAFF", dName: "KASHIMO'S ELECTRICAL STAFF", col: "#ffb703" },
    dagger: { name: "DAGGER", dName: "SLAUGHTER DEVON", col: "#ee2400" }
};

let equippedItem = "none";
let entities = [];
let particles = [];
let projectNails = [];
let activeBeams = [];
let activeClash = null;
let impactFrames = []; 
let mapDebris = []; 
let player;
let camX = 0;
let shake = 0;
let kills = 0;
let globalFrames = 0;
let activeDomain = null; 
let currentMode = "battle"; 
let selectedCharacter = "yuji";
let keys = {};

function generateShinjukuMap() {
    mapDebris = [];
    for(let i=0; i<30; i++) {
        mapDebris.push({
            x: Math.random() * 3500,
            y: GROUND - (Math.random() * 250 + 20),
            w: Math.random() * 60 + 30,
            h: Math.random() * 140 + 40,
            color: Math.random() > 0.5 ? "#2b2d42" : "#1a1c23"
        });
    }
}

class Entity {
    constructor(x, y, type, isBot = false, isPassiveDummy = false) {
        this.x = x; this.y = y; this.type = type; this.isBot = isBot; this.isPassiveDummy = isPassiveDummy;
        this.w = 38; this.h = 68;
        this.vx = 0; this.vy = 0;
        this.hp = isPassiveDummy ? 1000 : 150; 
        this.maxHp = this.hp;
        this.ult = 0;
        this.facing = 1;
        this.dead = false;
        this.cooldowns = { s1: 0, s2: 0, m1: 0, blackFlash: 0 };
        this.mechamaruPuppets = []; 
        this.bfWindowTimer = 0; 
        this.lastHitTarget = null;
        this.bfChainCount = 0;
        this.animTimer = Math.random() * 100;
    }

    respawn() {
        this.dead = false;
        this.hp = this.maxHp;
        this.x = player ? player.x + (Math.random() * 400 - 200) : 400;
        this.y = GROUND - this.h;
    }

    takeDmg(amount, attacker) {
        if (this.dead) return;
        this.hp -= amount;
        if (attacker && attacker === player) {
            player.ult = Math.min(100, player.ult + amount * 0.9);
        }
        if (this.hp <= 0) {
            this.hp = 0;
            this.dead = true;
            if (this === player) {
                setTimeout(() => { openMenuFromGame(); }, 2000);
            } else {
                kills++;
                setTimeout(() => {
                    if (!this.isPassiveDummy && currentMode === "battle") {
                        let randType = Object.keys(CHARS)[Math.floor(Math.random() * Object.keys(CHARS).length)];
                        entities.push(new Entity(player.x + (Math.random() * 700 - 350), GROUND - 100, randType, true));
                    }
                }, 1200);
            }
        }
    }

    update() {
        if (this.dead) {
            if (this.isPassiveDummy) this.respawn();
            return;
        }

        if (activeClash && (activeClash.p1 === this || activeClash.p2 === this)) {
            this.vx = 0;
            this.animTimer += 0.02;
            return;
        }

        let currentVel = Math.abs(this.vx);
        this.animTimer += currentVel > 0.5 ? (currentVel * 0.04) : 0.04;

        let isFrozenByGojo = activeDomain && activeDomain.type === 'gojo' && activeDomain.owner !== this;
        if (isFrozenByGojo) {
            this.vx = 0;
            this.vy += 0.65;
            this.x += this.vx; this.y += this.vy;
            if (this.y + this.h > GROUND) { this.y = GROUND - this.h; this.vy = 0; }
            return;
        }

        this.vy += 0.65;
        this.vx *= 0.85;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h > GROUND) {
            this.y = GROUND - this.h;
            this.vy = 0;
        }

        if (this.x < 0) this.x = 0;
        if (this.x > 3500) this.x = 3500;

        Object.keys(this.cooldowns).forEach(k => { if(this.cooldowns[k] > 0) this.cooldowns[k]--; });

        if (this.isPassiveDummy) this.processDummyAI();
        else if (this.isBot) this.processProximityAI();
        else this.processInput();

        if (this.type === 'mechamaru' && globalFrames % 90 === 0 && this.mechamaruPuppets.length < 3) {
            this.mechamaruPuppets.push({ orbitOffset: Math.random() * Math.PI, hp: 20 });
        }

        if (globalFrames % 6 === 0 && !this.isPassiveDummy) {
            let auraCol = CHARS[this.type].col;
            if (activeDomain && activeDomain.owner === this) auraCol = "#ffffff";
            spawnVisualEffect(this.x + Math.random() * this.w, this.y + Math.random() * this.h, auraCol, 1, 'aura');
        }
    }

    processDummyAI() {
        if (player && !player.dead) {
            let dist = player.x - this.x;
            this.facing = dist > 0 ? 1 : -1;
        }
    }

    processProximityAI() {
        let targets = [player].filter(t => t && !t.dead);
        if (targets.length === 0) return;
        let target = targets[0];
        let dist = target.x - this.x;
        this.facing = dist > 0 ? 1 : -1;

        if (Math.abs(dist) > 180 && this.type === 'ryu') {
            if (this.cooldowns.s2 === 0) { this.executeTechnique2(); return; }
        }

        if (Math.abs(dist) > 60) {
            this.vx = this.facing * 4.5;
        }

        if (globalFrames % 30 === 0 && Math.random() < 0.6) {
            let absD = Math.abs(dist);
            if (absD < 85) {
                this.executeBasicStrike();
                if (this.bfWindowTimer > 0) this.executeBlackFlashAction();
            } else if (absD < 280) {
                if (Math.random() < 0.5) this.executeTechnique1();
                else this.executeTechnique2();
            }
            if (this.ult >= 100 && Math.random() < 0.2) this.triggerDomainExpansion();
        }
    }

    processInput() {
        let speedMod = 1.0;
        if (equippedItem === "staff") speedMod = 1.35; 
        if (this.type === 'yuji') speedMod *= 1.25; 

        if (keys['a']) { this.vx = -6.5 * speedMod; this.facing = -1; }
        if (keys['d']) { this.vx = 6.5 * speedMod; this.facing = 1; }
        if ((keys['w'] || keys[' ']) && this.y >= GROUND - this.h) { this.vy = -15.0; playSound(240, 'triangle', 0.12, 0.06); keys['w'] = false; keys[' '] = false; }
        if (keys['m1']) {
            if (activeClash && activeClash.playerInvolved) {
                activeClash.value += 12; // Button mashing logic for beam struggles
                keys['m1'] = false;
                playSound(300, 'sawtooth', 0.05, 0.15);
            } else {
                this.executeBasicStrike();
            }
        }
        if (keys['e']) this.executeTechnique1();
        if (keys['r']) this.executeTechnique2();
        if (keys['g'] && this.ult >= 100) this.triggerDomainExpansion();
        if (keys['0']) this.executeBlackFlashAction();
    }

    executeBasicStrike() {
        if (this.cooldowns.m1 > 0) return; 
        this.cooldowns.m1 = 12;
        keys['m1'] = false;

        let baseDmg = 8; 
        let range = 85;

        if (!this.isBot) {
            if (equippedItem === "ring") baseDmg *= 1.30;       
            if (equippedItem === "dagger") baseDmg *= 1.45;     
        }

        let hitX = this.facing === 1 ? this.x + this.w : this.x - range;
        let hitRegistered = false;

        spawnVisualEffect(this.x + (this.facing * range/2) + this.w/2, this.y + this.h/2, CHARS[this.type].col, 15, 'slash');

        let scanList = entities.concat([player]);
        scanList.forEach(t => {
            if (t && !t.dead && t !== this) {
                if (t.x + t.w > hitX && t.x < hitX + range && t.y + t.h > this.y && t.y < this.y + this.h) {
                    t.takeDmg(baseDmg, this);
                    t.vx = this.facing * 7;
                    hitRegistered = true;
                    this.bfWindowTimer = 35; 
                    this.lastHitTarget = t;
                    triggerImpactFrame(t.x, t.y, CHARS[this.type].col);
                }
            }
        });

        playSound(hitRegistered ? 150 : 380, 'triangle', 0.1, 0.08);
    }

    executeTechnique1() {
        if (this.cooldowns.s1 > 0) return;
        this.cooldowns.s1 = 45;
        keys['e'] = false;
        let scanList = entities.concat([player]);

        if (this.type === 'ryu') {
            playSound(180, 'sawtooth', 0.2, 0.25);
            spawnVisualEffect(this.x + (this.facing * 80), this.y + 20, "#ff5722", 20, 'slash');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 100) {
                    t.takeDmg(15, this); t.vx = this.facing * 10;
                    this.bfWindowTimer = 35; this.lastHitTarget = t;
                    triggerImpactFrame(t.x, t.y, "#ff5722");
                }
            });
        }
        else if (this.type === 'nobara') {
            playSound(400, 'sawtooth', 0.15, 0.2);
            for(let i = -1; i <= 1; i++) {
                projectNails.push({ 
                    x: this.x + (this.facing * 40), y: this.y + 20, vx: this.facing * 14, vy: i * 2, owner: this, alive: true, col: "#cdb4db" 
                });
            }
        }
        else if (this.type === 'mechamaru') {
            playSound(120, 'square', 0.5, 0.3);
            activeBeams.push({
                owner: this, x: this.x + (this.facing * 30), y: this.y + 25, vx: this.facing * 16, length: 140, h: 22, col: "#b5838d", dmg: 25, alive: true
            });
        }
        else if (this.type === 'mahito') {
            playSound(220, 'sawtooth', 0.2, 0.25);
            spawnVisualEffect(this.x + (this.facing * 90), this.y + 20, "#a2d2ff", 30, 'slash');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 110) {
                    t.takeDmg(16, this); t.vx = this.facing * 5;
                    this.bfWindowTimer = 35; this.lastHitTarget = t;
                    triggerImpactFrame(t.x, t.y, "#a2d2ff");
                }
            });
        }
        else if (this.type === 'yuji') {
            playSound(170, 'sawtooth', 0.28, 0.2);
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 120) {
                    t.takeDmg(12, this); t.vx = this.facing * 8;
                    this.bfWindowTimer = 40; this.lastHitTarget = t;
                    setTimeout(() => {
                        if (!t.dead) { t.takeDmg(15, this); spawnVisualEffect(t.x + t.w/2, t.y + t.h/2, "#ff758f", 20, 'shatter'); }
                    }, 200);
                }
            });
        }
        else if (this.type === 'gojo') {
            let targetX = this.x + (this.facing * 200);
            spawnVisualEffect(targetX, this.y + 20, "#48cae4", 30, 'spark');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - targetX) < 150) {
                    t.x = this.x + (this.facing * 60); t.takeDmg(14, this);
                    this.bfWindowTimer = 40; this.lastHitTarget = t;
                }
            });
        }
        else {
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 160) {
                    t.takeDmg(15, this); t.vx = this.facing * 8;
                    this.bfWindowTimer = 35; this.lastHitTarget = t;
                }
            });
        }
    }

    executeTechnique2() {
        if (this.cooldowns.s2 > 0) return;
        this.cooldowns.s2 = 80;
        keys['r'] = false;

        if (this.type === 'ryu') {
            playSound(90, 'sawtooth', 0.5, 0.4);
            activeBeams.push({
                owner: this, x: this.x + (this.facing * 30), y: this.y + 15, vx: this.facing * 18, length: 180, h: 32, col: "#ff5722", dmg: 35, alive: true
            });
        }
        else if (this.type === 'nobara') {
            playSound(180, 'sine', 0.4, 0.35); shake = 20;
            let scanList = entities.concat([player]);
            scanList.forEach(t => {
                if (t && !t.dead && t !== this) {
                    t.takeDmg(24, this);
                    spawnVisualEffect(t.x + t.w/2, t.y + t.h/2, "#ff0055", 35, 'shatter');
                    triggerImpactFrame(t.x, t.y, "#ff3366");
                }
            });
        }
        else if (this.type === 'mechamaru') {
            playSound(80, 'sawtooth', 0.6, 0.4);
            let burstRadius = 200;
            let scanList = entities.concat([player]);
            spawnVisualEffect(this.x + this.w/2, this.y + this.h/2, "#b5838d", 45, 'fountain');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < burstRadius) {
                    t.takeDmg(28, this); t.vx = this.facing * 16; t.vy = -8;
                }
            });
            this.mechamaruPuppets = []; 
        }
        else if (this.type === 'mahito') {
            playSound(90, 'square', 0.4, 0.3); shake = 15;
            let scanList = entities.concat([player]);
            spawnVisualEffect(this.x, this.y, "#ff758f", 40, 'fountain');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 220) {
                    t.takeDmg(26, this); t.vx = this.facing * 14;
                }
            });
        }
        else if (this.type === 'sukuna') {
            playSound(70, 'sawtooth', 0.5, 0.4);
            activeBeams.push({
                owner: this, x: this.x + (this.facing * 30), y: this.y + 20, vx: this.facing * 15, length: 150, h: 26, col: "#ffb703", dmg: 32, alive: true
            });
        }
        else {
            let scanList = entities.concat([player]);
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 180) { t.takeDmg(18, this); t.vx = this.facing * 10; }
            });
        }
    }

    executeBlackFlashAction() {
        if (this.bfWindowTimer <= 0 || !this.lastHitTarget || this.lastHitTarget.dead) return;
        
        this.bfWindowTimer = 0; 
        keys['0'] = false;
        this.bfChainCount++;
        
        let target = this.lastHitTarget;
        let flashDmg = 30 * (1.0 + (this.bfChainCount * 0.3));
        target.takeDmg(flashDmg, this);
        
        target.vx = this.facing * (14 + this.bfChainCount * 3);
        target.vy = -6;
        shake = 35;

        playSound(50, 'square', 0.5, 0.45);
        triggerImpactFrame(target.x, target.y, "#ff0033");

        spawnVisualEffect(target.x + target.w/2, target.y + target.h/2, "#ff0033", 60, 'shatter');
        spawnVisualEffect(target.x + target.w/2, target.y + target.h/2, "#000000", 40, 'aura');

        if (this === player) {
            let el = document.getElementById("flash-alert");
            el.innerText = `BLACK FLASH x${this.bfChainCount}`;
            el.style.opacity = "1";
            el.style.transform = "translate(-50%, -50%) scale(1.2)";
            setTimeout(() => { el.style.opacity = "0"; }, 500);
        }
    }

    triggerDomainExpansion() {
        if (this.ult < 100) return;
        this.ult = 0; keys['g'] = false;

        activeDomain = {
            owner: this,
            type: this.type,
            name: CHARS[this.type].domain,
            x: this.x + this.w/2,
            y: this.y + this.h/2,
            radius: 10,
            maxRadius: 500,
            life: 400 
        };

        shake = 40;
        playSound(60, 'sine', 1.5, 0.5);
        
        let dAlert = document.getElementById("domain-alert");
        let headerText = CHARS[this.type].hasDomain ? "DOMAIN EXPANSION" : "ULTIMATE ACTIVE";
        dAlert.innerText = `${CHARS[this.type].name.toUpperCase()}\n${headerText}:\n${CHARS[this.type].domain.toUpperCase()}`;
        dAlert.style.opacity = "1";
        setTimeout(() => { dAlert.style.opacity = "0"; }, 2000);
    }

    drawStickFigure(ctx, cx) {
        let col = CHARS[this.type].col;
        ctx.strokeStyle = col;
        ctx.fillStyle = col;
        ctx.lineWidth = 4.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        let isGrounded = this.y >= GROUND - this.h;
        let isMoving = Math.abs(this.vx) > 0.75;
        let isPunching = this.cooldowns.m1 > 0;
        let isCasting = this.cooldowns.s1 > 20 || this.cooldowns.s2 > 40;
        let isClashing = activeClash && (activeClash.p1 === this || activeClash.p2 === this);

        let t = this.animTimer;
        let lean = 0; 
        let bounceY = 0;

        if (isMoving && isGrounded) {
            lean = this.facing * 0.18; 
            bounceY = Math.sin(t * Math.PI * 2) * 4; 
        }
        if (!isGrounded) {
            lean = this.facing * 0.05;
            bounceY = 3; 
        }
        if (isPunching || isClashing) {
            lean = this.facing * 0.35; // Deep brace stance for clashes
            bounceY = 4;
        }

        let isGojoFloat = this.type === 'gojo';
        let isSukunaCrossed = this.type === 'sukuna' && !isPunching && !isCasting && isGrounded && !isClashing;

        if (isGojoFloat) {
            bounceY = Math.sin(globalFrames * 0.05) * 6 - 12; 
            isMoving = false; 
        }

        let headRadius = 8.5;
        let spineLen = 22;
        let upperLegLen = 17;
        let lowerLegLen = 16;

        let originX = this.x + this.w / 2 - cx;
        let originY = this.y + headRadius + 4 + bounceY;

        let neckX = originX + (lean * 6);
        let neckY = originY + headRadius;

        let pelvisX = originX - (lean * 4);
        let pelvisY = neckY + spineLen;

        // Special rendering feature: Ryu's massive pompadour cannon hair
        if (this.type === 'ryu') {
            ctx.fillStyle = col;
            ctx.beginPath();
            ctx.moveTo(originX - (this.facing * 4), originY - headRadius + 2);
            ctx.quadraticCurveTo(originX + (this.facing * 18), originY - headRadius - 12, originX + (this.facing * 22), originY - headRadius + 2);
            ctx.quadraticCurveTo(originX + (this.facing * 10), originY - 2, originX - (this.facing * 2), originY - 2);
            ctx.fill();
        }

        // Draw Head
        ctx.beginPath();
        ctx.arc(originX, originY, headRadius, 0, Math.PI * 2);
        ctx.fill();

        // Draw Spinal Torso Column
        ctx.beginPath();
        ctx.moveTo(neckX, neckY);
        ctx.lineTo(pelvisX, pelvisY);
        ctx.stroke();

        // Leg Kinematic Node Joint Vectors
        let legDraw = (phaseOffset, sideSign) => {
            let footTargetX, footTargetY;
            if (isGrounded && (isMoving || Math.abs(this.vx) > 0.1)) {
                let cycle = (t * Math.PI * 2 + phaseOffset) % (Math.PI * 2);
                let strideRadius = 16 * this.facing;
                footTargetX = pelvisX + Math.cos(cycle) * strideRadius;
                if (Math.sin(cycle) > 0) footTargetY = GROUND; 
                else footTargetY = GROUND + Math.sin(cycle) * 11;
            } else if (isClashing) {
                // Wide braced footing stance for beam struggle logic
                footTargetX = pelvisX + (sideSign === 1 ? 22 : -14) * this.facing;
                footTargetY = GROUND;
            } else if (!isGrounded) {
                footTargetX = pelvisX + (sideSign * 5) - (this.vx * 1.5);
                footTargetY = pelvisY + upperLegLen + lowerLegLen - 4;
            } else {
                footTargetX = pelvisX + sideSign * 8;
                footTargetY = GROUND;
            }

            let dx = footTargetX - pelvisX;
            let dy = footTargetY - pelvisY;
            let distanceToFoot = Math.sqrt(dx * dx + dy * dy);
            let maxReach = (upperLegLen + lowerLegLen) * 0.98;
            if (distanceToFoot > maxReach) {
                footTargetX = pelvisX + (dx / distanceToFoot) * maxReach;
                footTargetY = pelvisY + (dy / distanceToFoot) * maxReach;
                dx = footTargetX - pelvisX; dy = footTargetY - pelvisY;
                distanceToFoot = maxReach;
            }

            let angleBase = Math.atan2(dy, dx);
            let cosKnee = (upperLegLen * upperLegLen + distanceToFoot * distanceToFoot - lowerLegLen * lowerLegLen) / (2 * upperLegLen * distanceToFoot);
            cosKnee = Math.max(-1, Math.min(1, cosKnee));
            let angleKneeOffset = Math.acos(cosKnee);

            let bendDirection = -this.facing;
            let kneeX = pelvisX + Math.cos(angleBase + bendDirection * angleKneeOffset) * upperLegLen;
            let kneeY = pelvisY + Math.sin(angleBase + bendDirection * angleKneeOffset) * upperLegLen;
