<script>
// --- AUDIO SYNTH GENERATION ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1, slideTo=0) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slideTo > 0) osc.frequency.exponentialRampToValueAtTime(slideTo, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
}

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let GROUND = H - 140;

window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    GROUND = H - 140;
});

const CHARS = {
    yuji:      { col: "#ff758f", name: "Yuji Itadori", hasDomain: true, domain: "Benevolent Shrine", m1: "Divergent Fist", m2: "Dismantle" },
    gojo:      { col: "#48cae4", name: "Gojo Satoru", hasDomain: true, domain: "Unlimited Void", m1: "Blue Pull", m2: "Red Repel" },
    sukuna:    { col: "#9b2226", name: "Sukuna", hasDomain: true, domain: "Malevolent Shrine", m1: "Cleave Grid", m2: "Fuga Arrow" },
    mahito:    { col: "#a2d2ff", name: "Mahito", hasDomain: true, domain: "Self-Embodiment", m1: "Soul Hack", m2: "Body Repel" },
    megumi:    { col: "#0f4c5c", name: "Megumi Fushiguro", hasDomain: true, domain: "Chimera Garden", m1: "Divine Dog", m2: "Nue Strike" },
    yuta:      { col: "#e0e1dd", name: "Yuta Okkotsu", hasDomain: true, domain: "Rika Unleashed", m1: "Copy Slate", m2: "Pure Love Burst" },
    nanami:    { col: "#ee9b00", name: "Nanami Kento", hasDomain: false, domain: "Collapse Shift", m1: "7:3 Ratio", m2: "Overtime Rush" },
    nobara:    { col: "#cdb4db", name: "Nobara Kugisaki", hasDomain: false, domain: "Hairpin Requiem", m1: "Resonance Nails", m2: "Hex Collapse" },
    mechamaru:{ col: "#b5838d", name: "Mechamaru", hasDomain: false, domain: "Alchemical Beam", m1: "Ultradrive Beam", m2: "Drone Explosion" },
    inumaki:  { col: "#e9d8a6", name: "Inumaki Toge", hasDomain: false, domain: "Cursed Speech", m1: "Don't Move", m2: "Blast Away" }
};

const ITEMS = {
    none:   { name: "NONE", dName: "NONE", col: "#ffffff" },
    ring:   { name: "RING", dName: "YUTA'S PURE LOVE RING", col: "#ff00cc" },
    staff:  { name: "STAFF", dName: "KASHIMO'S ELECTRICAL STAFF", col: "#ffb703" },
    dagger: { name: "DAGGER", dName: "SLAUGHTER DEVON", col: "#ee2400" }
};

let equippedItem = "none";
let entities = [];
let particles = [];
let projectNails = [];
let impactFrames = []; 
let mapDebris = []; 
let player;
let camX = 0;
let shake = 0;
let kills = 0;
let globalFrames = 0;
let activeDomain = null; 
let currentMode = "battle"; 
let selectedCharacter = "yuji";
let keys = {};

function generateShinjukuMap() {
    mapDebris = [];
    for(let i=0; i<30; i++) {
        mapDebris.push({
            x: Math.random() * 3500,
            y: GROUND - (Math.random() * 250 + 20),
            w: Math.random() * 60 + 30,
            h: Math.random() * 140 + 40,
            color: Math.random() > 0.5 ? "#2b2d42" : "#1a1c23"
        });
    }
}

class Entity {
    constructor(x, y, type, isBot = false, isPassiveDummy = false) {
        this.x = x; this.y = y; this.type = type; this.isBot = isBot; this.isPassiveDummy = isPassiveDummy;
        this.w = 38; this.h = 68;
        this.vx = 0; this.vy = 0;
        this.hp = isPassiveDummy ? 1000 : 150; 
        this.maxHp = this.hp;
        this.ult = 0;
        this.facing = 1;
        this.dead = false;
        this.cooldowns = { s1: 0, s2: 0, m1: 0, blackFlash: 0 };
        this.mechamaruPuppets = []; 
        this.bfWindowTimer = 0; 
        this.lastHitTarget = null;
        this.bfChainCount = 0;
        this.animTimer = Math.random() * 100;
    }

    respawn() {
        this.dead = false;
        this.hp = this.maxHp;
        this.x = player ? player.x + (Math.random() * 400 - 200) : 400;
        this.y = GROUND - this.h;
    }

    takeDmg(amount, attacker) {
        if (this.dead) return;
        this.hp -= amount;
        if (attacker && attacker === player) {
            player.ult = Math.min(100, player.ult + amount * 0.9);
        }
        if (this.hp <= 0) {
            this.hp = 0;
            this.dead = true;
            if (this === player) {
                setTimeout(() => { openMenuFromGame(); }, 2000);
            } else {
                kills++;
                setTimeout(() => {
                    if (!this.isPassiveDummy && currentMode === "battle") {
                        let randType = Object.keys(CHARS)[Math.floor(Math.random() * Object.keys(CHARS).length)];
                        entities.push(new Entity(player.x + (Math.random() * 700 - 350), GROUND - 100, randType, true));
                    }
                }, 1200);
            }
        }
    }

    update() {
        if (this.dead) {
            if (this.isPassiveDummy) this.respawn();
            return;
        }

        // Smoother incremental timeline speed modifier based on current movement state
        let currentVel = Math.abs(this.vx);
        this.animTimer += currentVel > 0.5 ? (currentVel * 0.04) : 0.04;

        let isFrozenByGojo = activeDomain && activeDomain.type === 'gojo' && activeDomain.owner !== this;
        if (isFrozenByGojo) {
            this.vx = 0;
            this.vy += 0.65;
            this.x += this.vx; this.y += this.vy;
            if (this.y + this.h > GROUND) { this.y = GROUND - this.h; this.vy = 0; }
            return;
        }

        this.vy += 0.65;
        this.vx *= 0.85;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h > GROUND) {
            this.y = GROUND - this.h;
            this.vy = 0;
        }

        if (this.x < 0) this.x = 0;
        if (this.x > 3500) this.x = 3500;

        Object.keys(this.cooldowns).forEach(k => { if(this.cooldowns[k] > 0) this.cooldowns[k]--; });

        if (this.isPassiveDummy) this.processDummyAI();
        else if (this.isBot) this.processProximityAI();
        else this.processInput();

        if (this.type === 'mechamaru' && globalFrames % 90 === 0 && this.mechamaruPuppets.length < 3) {
            this.mechamaruPuppets.push({ orbitOffset: Math.random() * Math.PI, hp: 20 });
        }

        if (globalFrames % 6 === 0 && !this.isPassiveDummy) {
            let auraCol = CHARS[this.type].col;
            if (activeDomain && activeDomain.owner === this) auraCol = "#ffffff";
            spawnVisualEffect(this.x + Math.random() * this.w, this.y + Math.random() * this.h, auraCol, 1, 'aura');
        }
    }

    processDummyAI() {
        if (player && !player.dead) {
            let dist = player.x - this.x;
            this.facing = dist > 0 ? 1 : -1;
        }
    }

    processProximityAI() {
        let targets = [player].filter(t => t && !t.dead);
        if (targets.length === 0) return;
        let target = targets[0];
        let dist = target.x - this.x;
        this.facing = dist > 0 ? 1 : -1;

        if (Math.abs(dist) > 60) {
            this.vx = this.facing * 4.5;
        }

        if (globalFrames % 30 === 0 && Math.random() < 0.6) {
            let absD = Math.abs(dist);
            if (absD < 85) {
                this.executeBasicStrike();
                if (this.bfWindowTimer > 0) this.executeBlackFlashAction();
            } else if (absD < 280) {
                if (Math.random() < 0.5) this.executeTechnique1();
                else this.executeTechnique2();
            }
            if (this.ult >= 100 && Math.random() < 0.2) this.triggerDomainExpansion();
        }
    }

    processInput() {
        let speedMod = 1.0;
        if (equippedItem === "staff") speedMod = 1.35; 
        if (this.type === 'yuji') speedMod *= 1.25; 

        if (keys['a']) { this.vx = -6.5 * speedMod; this.facing = -1; }
        if (keys['d']) { this.vx = 6.5 * speedMod; this.facing = 1; }
        if ((keys['w'] || keys[' ']) && this.y >= GROUND - this.h) { this.vy = -15.0; playSound(240, 'triangle', 0.12, 0.06); keys['w'] = false; keys[' '] = false; }
        if (keys['m1']) this.executeBasicStrike();
        if (keys['e']) this.executeTechnique1();
        if (keys['r']) this.executeTechnique2();
        if (keys['g'] && this.ult >= 100) this.triggerDomainExpansion();
        if (keys['0']) this.executeBlackFlashAction();
    }

    executeBasicStrike() {
        if (this.cooldowns.m1 > 0) return; 
        this.cooldowns.m1 = 12;
        keys['m1'] = false;

        let baseDmg = 8; 
        let range = 85;

        if (!this.isBot) {
            if (equippedItem === "ring") baseDmg *= 1.30;       
            if (equippedItem === "dagger") baseDmg *= 1.45;     
        }

        let hitX = this.facing === 1 ? this.x + this.w : this.x - range;
        let hitRegistered = false;

        spawnVisualEffect(this.x + (this.facing * range/2) + this.w/2, this.y + this.h/2, CHARS[this.type].col, 15, 'slash');

        let scanList = entities.concat([player]);
        scanList.forEach(t => {
            if (t && !t.dead && t !== this) {
                if (t.x + t.w > hitX && t.x < hitX + range && t.y + t.h > this.y && t.y < this.y + this.h) {
                    t.takeDmg(baseDmg, this);
                    t.vx = this.facing * 7;
                    hitRegistered = true;
                    this.bfWindowTimer = 35; 
                    this.lastHitTarget = t;
                    triggerImpactFrame(t.x, t.y, CHARS[this.type].col);
                }
            }
        });

        playSound(hitRegistered ? 150 : 380, 'triangle', 0.1, 0.08);
    }

    executeTechnique1() {
        if (this.cooldowns.s1 > 0) return;
        this.cooldowns.s1 = 45;
        keys['e'] = false;
        let scanList = entities.concat([player]);

        if (this.type === 'nobara') {
            playSound(400, 'sawtooth', 0.15, 0.2);
            for(let i = -1; i <= 1; i++) {
                projectNails.push({ 
                    x: this.x + (this.facing * 40), y: this.y + 20, vx: this.facing * 14, vy: i * 2, owner: this, alive: true, col: "#cdb4db" 
                });
            }
        }
        else if (this.type === 'mechamaru') {
            playSound(120, 'square', 0.5, 0.3);
            spawnVisualEffect(this.x + (this.facing * 180), this.y + 20, "#ffb703", 40, 'slash');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 380) {
                    t.takeDmg(20, this); t.vx = this.facing * 12;
                    triggerImpactFrame(t.x, t.y, "#ffb703");
                }
            });
        }
        else if (this.type === 'mahito') {
            playSound(220, 'sawtooth', 0.2, 0.25);
            spawnVisualEffect(this.x + (this.facing * 90), this.y + 20, "#a2d2ff", 30, 'slash');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 110) {
                    t.takeDmg(16, this); t.vx = this.facing * 5;
                    this.bfWindowTimer = 35; this.lastHitTarget = t;
                    triggerImpactFrame(t.x, t.y, "#a2d2ff");
                }
            });
        }
        else if (this.type === 'yuji') {
            playSound(170, 'sawtooth', 0.28, 0.2);
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 120) {
                    t.takeDmg(12, this); t.vx = this.facing * 8;
                    this.bfWindowTimer = 40; this.lastHitTarget = t;
                    setTimeout(() => {
                        if (!t.dead) { t.takeDmg(15, this); spawnVisualEffect(t.x + t.w/2, t.y + t.h/2, "#ff758f", 20, 'shatter'); }
                    }, 200);
                }
            });
        }
        else if (this.type === 'gojo') {
            let targetX = this.x + (this.facing * 200);
            spawnVisualEffect(targetX, this.y + 20, "#48cae4", 30, 'spark');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - targetX) < 150) {
                    t.x = this.x + (this.facing * 60); t.takeDmg(14, this);
                    this.bfWindowTimer = 40; this.lastHitTarget = t;
                }
            });
        }
        else {
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 160) {
                    t.takeDmg(15, this); t.vx = this.facing * 8;
                    this.bfWindowTimer = 35; this.lastHitTarget = t;
                }
            });
        }
    }

    executeTechnique2() {
        if (this.cooldowns.s2 > 0) return;
        this.cooldowns.s2 = 70;
        keys['r'] = false;
        let scanList = entities.concat([player]);

        if (this.type === 'nobara') {
            playSound(180, 'sine', 0.4, 0.35); shake = 20;
            scanList.forEach(t => {
                if (t && !t.dead && t !== this) {
                    t.takeDmg(24, this);
                    spawnVisualEffect(t.x + t.w/2, t.y + t.h/2, "#ff0055", 35, 'shatter');
                    triggerImpactFrame(t.x, t.y, "#ff3366");
                }
            });
        }
        else if (this.type === 'mechamaru') {
            playSound(80, 'sawtooth', 0.6, 0.4);
            let burstRadius = 200;
            spawnVisualEffect(this.x + this.w/2, this.y + this.h/2, "#b5838d", 45, 'fountain');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < burstRadius) {
                    t.takeDmg(28, this); t.vx = this.facing * 16; t.vy = -8;
                }
            });
            this.mechamaruPuppets = []; 
        }
        else if (this.type === 'mahito') {
            playSound(90, 'square', 0.4, 0.3); shake = 15;
            spawnVisualEffect(this.x, this.y, "#ff758f", 40, 'fountain');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 220) {
                    t.takeDmg(26, this); t.vx = this.facing * 14;
                }
            });
        }
        else if (this.type === 'sukuna') {
            playSound(100, 'sawtooth', 0.4, 0.3);
            let fireX = this.x + (this.facing * 200);
            spawnVisualEffect(fireX, this.y, "#ffb703", 50, 'aura');
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - fireX) < 150) { t.takeDmg(30, this); t.vy = -10; }
            });
        }
        else {
            scanList.forEach(t => {
                if (t && !t.dead && t !== this && Math.abs(t.x - this.x) < 180) { t.takeDmg(18, this); t.vx = this.facing * 10; }
            });
        }
    }

    executeBlackFlashAction() {
        if (this.bfWindowTimer <= 0 || !this.lastHitTarget || this.lastHitTarget.dead) return;
        
        this.bfWindowTimer = 0; 
        keys['0'] = false;
        this.bfChainCount++;
        
        let target = this.lastHitTarget;
        let flashDmg = 30 * (1.0 + (this.bfChainCount * 0.3));
        target.takeDmg(flashDmg, this);
        
        target.vx = this.facing * (14 + this.bfChainCount * 3);
        target.vy = -6;
        shake = 35;

        playSound(50, 'square', 0.5, 0.45);
        triggerImpactFrame(target.x, target.y, "#ff0033");

        spawnVisualEffect(target.x + target.w/2, target.y + target.h/2, "#ff0033", 60, 'shatter');
        spawnVisualEffect(target.x + target.w/2, target.y + target.h/2, "#000000", 40, 'aura');

        if (this === player) {
            let el = document.getElementById("flash-alert");
            el.innerText = `BLACK FLASH x${this.bfChainCount}`;
            el.style.opacity = "1";
            el.style.transform = "translate(-50%, -50%) scale(1.2)";
            setTimeout(() => { el.style.opacity = "0"; }, 500);
        }
    }

    triggerDomainExpansion() {
        if (this.ult < 100) return;
        this.ult = 0; keys['g'] = false;

        activeDomain = {
            owner: this,
            type: this.type,
            name: CHARS[this.type].domain,
            x: this.x + this.w/2,
            y: this.y + this.h/2,
            radius: 10,
            maxRadius: 500,
            life: 400 
        };

        shake = 40;
        playSound(60, 'sine', 1.5, 0.5);
        
        let dAlert = document.getElementById("domain-alert");
        let headerText = CHARS[this.type].hasDomain ? "DOMAIN EXPANSION" : "ULTIMATE ACTIVE";
        dAlert.innerText = `${CHARS[this.type].name.toUpperCase()}\n${headerText}:\n${CHARS[this.type].domain.toUpperCase()}`;
        dAlert.style.opacity = "1";
        setTimeout(() => { dAlert.style.opacity = "0"; }, 2000);
    }

    // --- REFACTORED FLIPACLIP TRADITIONAL PASSING-STANCE INVERSE KINEMATICS ---
    drawStickFigure(ctx, cx) {
        let col = CHARS[this.type].col;
        ctx.strokeStyle = col;
        ctx.fillStyle = col;
        ctx.lineWidth = 4.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        let isGrounded = this.y >= GROUND - this.h;
        let isMoving = Math.abs(this.vx) > 0.75;
        let isPunching = this.cooldowns.m1 > 0;
        let isCasting = this.cooldowns.s1 > 20 || this.cooldowns.s2 > 40;

        let t = this.animTimer;
        
        // Kinematic Weight Profiles
        let lean = 0; 
        let bounceY = 0;
        let hipAngle = 0;

        if (isMoving && isGrounded) {
            lean = this.facing * 0.18; // Lean slightly into the velocity acceleration
            
            // Traditional Animation Curve mapping: Low down curves, high passing sweeps
            // Sin squared creates a localized high bounce, tracking dual leg strikes per rotation loop
            bounceY = Math.sin(t * Math.PI * 2) * 4; 
            hipAngle = Math.cos(t * Math.PI * 2) * 0.15;
        }
        if (!isGrounded) {
            lean = this.facing * 0.05;
            bounceY = 3; // Drop hips lower when suspended in free air space
        }
        if (isPunching) {
            lean = this.facing * 0.32;
        }

        let isGojoFloat = this.type === 'gojo';
        let isSukunaCrossed = this.type === 'sukuna' && !isPunching && !isCasting && isGrounded;

        if (isGojoFloat) {
            bounceY = Math.sin(globalFrames * 0.05) * 6 - 12; // Constant smooth floating glide
            isMoving = false; // Override stance behaviors to preserve floating majesty
        }

        // Base Joint Nodes Setup
        let headRadius = 8.5;
        let spineLen = 22;
        let upperLegLen = 17;
        let lowerLegLen = 16;

        let originX = this.x + this.w / 2 - cx;
        let originY = this.y + headRadius + 4 + bounceY;

        let neckX = originX + (lean * 6);
        let neckY = originY + headRadius;

        let pelvisX = originX - (lean * 4);
        let pelvisY = neckY + spineLen;

        // Draw Head
        ctx.beginPath();
        ctx.arc(originX, originY, headRadius, 0, Math.PI * 2);
        ctx.fill();

        // Draw Spinal Torso Column
        ctx.beginPath();
        ctx.moveTo(neckX, neckY);
        ctx.lineTo(pelvisX, pelvisY);
        ctx.stroke();

        // Compute Leg Kinematic Node Joint Vectors
        let legDraw = (phaseOffset, sideSign) => {
            let footTargetX, footTargetY;
            
            if (isGrounded && (isMoving || Math.abs(this.vx) > 0.1)) {
                // Ground phase evaluation map
                let cycle = (t * Math.PI * 2 + phaseOffset) % (Math.PI * 2);
                
                // Elliptical rotation tracing the true swing trajectory of a natural ankle footprint
                let strideRadius = 16 * this.facing;
                
                // Horizontal tracking calculation loop
                footTargetX = pelvisX + Math.cos(cycle) * strideRadius;
                
                // Vertical check: If tracing the under half of rotation cycle, plant it directly flat onto the tarmac
                if (Math.sin(cycle) > 0) {
                    footTargetY = GROUND; // Floor Planted Phase
                } else {
                    // Swing/Passing Phase: Clean vertical arc clearance
                    footTargetY = GROUND + Math.sin(cycle) * 11;
                }
            } else if (!isGrounded) {
                // Free Hanging Suspension Profile
                footTargetX = pelvisX + (sideSign * 5) - (this.vx * 1.5);
                footTargetY = pelvisY + upperLegLen + lowerLegLen - 4;
            } else {
                // Pure Idle Default Stand Stance
                footTargetX = pelvisX + sideSign * 8;
                footTargetY = GROUND;
            }

            // Analytical Two-Joint IK Geometric Solver (Trigonometric Triangle Solver)
            let dx = footTargetX - pelvisX;
            let dy = footTargetY - pelvisY;
            let distanceToFoot = Math.sqrt(dx * dx + dy * dy);
            
            // Constrain target threshold boundaries to protect from leg separation bugs
            let maxReach = (upperLegLen + lowerLegLen) * 0.98;
            if (distanceToFoot > maxReach) {
                footTargetX = pelvisX + (dx / distanceToFoot) * maxReach;
                footTargetY = pelvisY + (dy / distanceToFoot) * maxReach;
                dx = footTargetX - pelvisX;
                dy = footTargetY - pelvisY;
                distanceToFoot = maxReach;
            }

            // Law of Cosines to extract matching interior knee bend angle profiles
            let angleBase = Math.atan2(dy, dx);
            let cosKnee = (upperLegLen * upperLegLen + distanceToFoot * distanceToFoot - lowerLegLen * lowerLegLen) / (2 * upperLegLen * distanceToFoot);
            cosKnee = Math.max(-1, Math.min(1, cosKnee));
            let angleKneeOffset = Math.acos(cosKnee);

            // Compute Knee Joint Position Node (Bend backwards relative to forward facing velocity vector)
            let bendDirection = -this.facing;
            let kneeX = pelvisX + Math.cos(angleBase + bendDirection * angleKneeOffset) * upperLegLen;
            let kneeY = pelvisY + Math.sin(angleBase + bendDirection * angleKneeOffset) * upperLegLen;

            // Render absolute lines across computed skeletal paths
            ctx.beginPath();
            ctx.moveTo(pelvisX, pelvisY);
            ctx.lineTo(kneeX, kneeY);
            ctx.lineTo(footTargetX, footTargetY);
            ctx.stroke();
        };

        // Render Background Loop Leg first, then Foreground Loop Leg for clean layer processing
        legDraw(Math.PI, -1); // Leg B (180 degrees out of phase)
        legDraw(0, 1);       // Leg A (Base Timeline Phase Alignment)

        // --- HANDS & UPPER SKELETAL RENDERING MATRIX ---
        let handL_X, handL_Y, handR_X, handR_Y;
        let armLen = 16;

        if (isPunching) {
            let punchProgress = (12 - this.cooldowns.m1) / 12;
            let extension = Math.sin(punchProgress * Math.PI) * (armLen * 2.1);
            
            handL_X = neckX + this.facing * extension;
            handL_Y = neckY + 1 - (punchProgress * 5);
            
            handR_X = neckX - this.facing * 5;
            handR_Y = neckY + 11;
        } 
        else if (isCasting) {
            handL_X = neckX + this.facing * (armLen * 1.4);
            handL_Y = neckY - 4;
            handR_X = neckX + this.facing * (armLen * 1.3);
            handR_Y = neckY + 4;
        } 
        else if (isSukunaCrossed) {
            handL_X = neckX + this.facing * 7;
            handL_Y = neckY + 9;
            handR_X = neckX - this.facing * 3;
            handR_Y = neckY + 11;
        }
        else if (isMoving && isGrounded) {
            // Natural Arm Swing (Opposite phase to sync naturally with leg stride intervals)
            let swingAngle = Math.sin(t * Math.PI * 2) * 0.65;
            handL_X = neckX + Math.sin(swingAngle) * armLen - (this.facing * 3);
            handL_Y = neckY + Math.cos(swingAngle) * armLen + 4;

            handR_X = neckX - Math.sin(swingAngle) * armLen + (this.facing * 2);
            handR_Y = neckY - Math.cos(swingAngle) * armLen + 4;
        }
        else {
            // Standard Relaxed Combat Crouch Pose Idle State
            handL_X = neckX + this.facing * 5;
            handL_Y = neckY + 14;
            handR_X = neckX - this.facing * 6;
            handR_Y = neckY + 13;
        }

        // Draw Left Arm Setup
        ctx.beginPath();
        ctx.moveTo(neckX, neckY);
        ctx.lineTo(handL_X, handL_Y);
        ctx.stroke();

        // Draw Right Arm Setup
        ctx.beginPath();
        ctx.moveTo(neckX, neckY);
        ctx.lineTo(handR_X, handR_Y);
        ctx.stroke();

        // Dynamic Cursed Weapon Layer Attachment Mapping Modifiers
        if (this === player && equippedItem !== "none") {
            let itemData = ITEMS[equippedItem];
            ctx.fillStyle = itemData.col;
            ctx.strokeStyle = itemData.col;
            ctx.lineWidth = 3;

            let mainHandX = handL_X;
            let mainHandY = handL_Y;

            if (equippedItem === "ring") {
                ctx.beginPath();
                ctx.arc(mainHandX, mainHandY, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (equippedItem === "staff") {
                ctx.beginPath();
                ctx.moveTo(mainHandX - 4, mainHandY - 24);
                ctx.lineTo(mainHandX + 4, mainHandY + 24);
                ctx.stroke();
                if (globalFrames % 4 === 0) {
                    spawnVisualEffect(mainHandX + (Math.random()*12-6), mainHandY - 12, "#ffb703", 2, 'spark');
                }
            } else if (equippedItem === "dagger") {
                ctx.beginPath();
                ctx.moveTo(mainHandX, mainHandY);
                ctx.lineTo(mainHandX + this.facing * 16, mainHandY - 6);
                ctx.stroke();
            }
        }
    }
}

// --- ENGINE INITIALIZATION AND INTEGRATED SUBSYSTEM LOOP CONTEXTS ---

function spawnVisualEffect(x, y, color, amount, type) {
    for (let i = 0; i < amount; i++) {
        particles.push({
            x: x, y: y,
            vx: type === 'fountain' ? (Math.random() * 8 - 4) : type === 'shatter' ? (Math.random() * 14 - 7) : (Math.random() * 4 - 2),
            vy: type === 'fountain' ? -(Math.random() * 10 + 3) : type === 'shatter' ? (Math.random() * 14 - 7) : (Math.random() * 4 - 2),
            life: Math.random() * 25 + 15,
            maxLife: 30,
            color: color,
            type: type
        });
    }
}

function triggerImpactFrame(x, y, color) {
    impactFrames.push({ x: x - camX, y: y, r: 10, maxR: 90, opacity: 1, color: color });
}

function showMenu(id) {
    document.querySelectorAll(".menu").forEach(m => m.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
    document.getElementById("ui").classList.add("hidden");
}

function selectItem(key) {
    equippedItem = key;
    document.getElementById("ui-item").innerText = `EQUIPPED: ${ITEMS[key].dName}`;
    showMenu('main-menu');
}

function openMenuFromGame() {
    activeDomain = null;
    showMenu('main-menu');
}

function populateRoster() {
    let container = document.getElementById("char-list");
    container.innerHTML = "";
    Object.keys(CHARS).forEach(k => {
        let btn = document.createElement("button");
        btn.className = "tool-btn";
        btn.style.borderLeft = `5px solid ${CHARS[k].col}`;
        btn.innerHTML = `${CHARS[k].name.toUpperCase()}<br><span style='font-size:10px; color:#aaa;'>Primary: ${CHARS[k].m1} | Ult: ${CHARS[k].domain}</span>`;
        btn.onclick = () => { selectedCharacter = k; showMenu('main-menu'); };
        container.appendChild(btn);
    });
}

function startArenaMode(mode) {
    currentMode = mode;
    document.querySelectorAll(".menu").forEach(m => m.classList.add("hidden"));
    document.getElementById("ui").classList.remove("hidden");

    let cData = CHARS[selectedCharacter];
    document.getElementById("ui-char").innerText = `SORCERER: ${cData.name.toUpperCase()}`;
    document.getElementById("ui-char").style.color = cData.col;
    document.getElementById("lbl-e").innerText = cData.m1.toUpperCase();
    document.getElementById("lbl-r").innerText = cData.m2.toUpperCase();

    kills = 0;
    entities = [];
    particles = [];
    projectNails = [];
    impactFrames = [];
    generateShinjukuMap();

    player = new Entity(300, GROUND - 100, selectedCharacter, false);
    
    if (mode === "training") {
        document.getElementById("arena-title").innerText = "TRAINING ARENA (PASSIVE)";
        entities.push(new Entity(550, GROUND - 100, "sukuna", true, true));
    } else {
        document.getElementById("arena-title").innerText = "SHINJUKU INCIDENT FIELD";
        entities.push(new Entity(650, GROUND - 100, "sukuna", true));
        entities.push(new Entity(950, GROUND - 100, "mahito", true));
    }

    try { if (audioCtx.state === 'suspended') audioCtx.resume(); } catch(e){}
    playSound(300, 'sine', 0.4, 0.1, 150);
}

// --- KEYBOARD SETUP ---
window.addEventListener('keydown', e => {
    let k = e.key.toLowerCase();
    keys[k] = true;
    if([' ', 'w', 'g', 'e', 'r', '0'].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// --- MOBILE INTERACTION CONTROL PAD TRACKING LOOPS ---
let joyStart = { x: 0, y: 0 };
let joyMove = { x: 0, y: 0 };
let joyActive = false;

const dpad = document.getElementById("mobile-dpad");
const joystick = document.getElementById("mobile-joystick");

dpad.addEventListener('touchstart', e => {
    joyActive = true;
    let t = e.touches[0];
    joyStart = { x: t.clientX, y: t.clientY };
}, { passive: true });

dpad.addEventListener('touchmove', e => {
    if (!joyActive) return;
    let t = e.touches[0];
    let dx = t.clientX - joyStart.x;
    let dy = t.clientY - joyStart.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let maxDist = 45;

    if (dist > maxDist) {
        dx = (dx / dist) * maxDist;
        dy = (dy / dist) * maxDist;
    }

    joystick.style.transform = `translate(${dx}px, ${dy}px)`;

    keys['a'] = dx < -15;
    keys['d'] = dx > 15;
});

dpad.addEventListener('touchend', () => {
    joyActive = false;
    joystick.style.transform = "translate(0px, 0px)";
    keys['a'] = false;
    keys['d'] = false;
});

function bindMobileButton(id, keyTarget) {
    let el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => { e.preventDefault(); keys[keyTarget] = true; });
    el.addEventListener('touchend', e => { e.preventDefault(); keys[keyTarget] = false; });
}

bindMobileButton("mb-up", "w");
bindMobileButton("mb-m1", "m1");
bindMobileButton("mb-e", "e");
bindMobileButton("mb-r", "r");
bindMobileButton("mb-g", "g");
bindMobileButton("mb-bf", "0");

// --- PRIMARY GAME REFRESH LOOP ---
function step() {
    globalFrames++;
    ctx.clearRect(0, 0, W, H);

    if (shake > 0) {
        ctx.save();
        let sx = (Math.random() * 2 - 1) * shake;
        let sy = (Math.random() * 2 - 1) * shake;
        ctx.translate(sx, sy);
        shake *= 0.9;
        if (shake < 0.2) shake = 0;
    }

    if (player) {
        let targetCamX = player.x - W / 2;
        camX += (targetCamX - camX) * 0.08;
        if (camX < 0) camX = 0;
        if (camX > 3500 - W) camX = 3500 - W;
    }

    // Render Environment Background Lines
    ctx.fillStyle = "#0c0d16";
    mapDebris.forEach(b => {
        ctx.fillRect(b.x - camX, b.y, b.w, b.h);
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.strokeRect(b.x - camX, b.y, b.w, b.h);
    });

    // Draw Ground
    ctx.strokeStyle = activeDomain ? "#ffffff" : "#ff3366";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, GROUND);
    ctx.lineTo(W, GROUND);
    ctx.stroke();

    // Render Domain Shells
    if (activeDomain) {
        activeDomain.life--;
        if (activeDomain.radius < activeDomain.maxRadius) activeDomain.radius += 18;

        let grad = ctx.createRadialGradient(activeDomain.x - camX, activeDomain.y, 10, activeDomain.x - camX, activeDomain.y, activeDomain.radius);
        let dCol = CHARS[activeDomain.type].col;
        grad.addColorStop(0, "rgba(5,6,12,0.85)");
        grad.addColorStop(0.8, "rgba(10,15,30,0.95)");
        grad.addColorStop(1, dCol);

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(activeDomain.x - camX, activeDomain.y, activeDomain.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        if (globalFrames % 10 === 0 && activeDomain.type === 'sukuna') {
            entities.concat([player]).forEach(t => {
                if (t && !t.dead && Math.abs(t.x - activeDomain.x) < activeDomain.radius) {
                    t.takeDmg(3, activeDomain.owner);
                    spawnVisualEffect(t.x + t.w/2, t.y + t.h/2, "#ff0033", 4, 'slash');
                }
            });
        }

        if (activeDomain.life <= 0) activeDomain = null;
    }

    // Update Entities
    if (player) {
        player.update();
        player.drawStickFigure(ctx, camX);
        
        document.getElementById("hp-bar").style.width = `${(player.hp / player.maxHp) * 100}%`;
        document.getElementById("ui-ult").innerText = `CURSED ENERGY OUTPUT: ${Math.floor(player.ult)}% ${player.ult >= 100 ? '[G - READY]' : '[G]'}`;
        document.getElementById("ui-kills").innerText = kills;

        let badgeE = document.getElementById("cd-e");
        let badgeR = document.getElementById("cd-r");
        badgeE.innerText = player.cooldowns.s1 > 0 ? `CD: ${Math.ceil(player.cooldowns.s1/60)}s` : "READY";
        badgeE.style.color = player.cooldowns.s1 > 0 ? "#ff3366" : "#45f3ff";
        badgeR.innerText = player.cooldowns.s2 > 0 ? `CD: ${Math.ceil(player.cooldowns.s2/60)}s` : "READY";
        badgeR.style.color = player.cooldowns.s2 > 0 ? "#ff3366" : "#45f3ff";

        let cl = document.getElementById("ui-clash");
        if (player.bfWindowTimer > 0) {
            cl.innerText = `BLACK FLASH TIMING WINDOW OPEN [HIT '0' or TAP FLASH]`;
            cl.style.textShadow = "0 0 8px #ff0055";
        } else {
            cl.innerText = "";
        }
    }

    entities.forEach(e => {
        e.update();
        e.drawStickFigure(ctx, camX);
        
        // Draw Bot HP Bar directly over their head node
        if (!e.dead) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(e.x - camX - 6, e.y - 18, e.w + 12, 5);
            ctx.fillStyle = CHARS[e.type].col;
            ctx.fillRect(e.x - camX - 6, e.y - 18, (e.hp / e.maxHp) * (e.w + 12), 5);
        }
    });

    // Update Projectile Nail Structures
    projectNails.forEach(n => {
        if (!n.alive) return;
        n.x += n.vx;
        n.y += n.vy;
        ctx.fillStyle = n.col;
        ctx.fillRect(n.x - camX, n.y, 8, 3);

        let targets = n.owner === player ? entities : [player];
        targets.forEach(t => {
            if (t && !t.dead && n.alive) {
                if (n.x > t.x && n.x < t.x + t.w && n.y > t.y && n.y < t.y + t.h) {
                    t.takeDmg(10, n.owner);
                    n.alive = false;
                    triggerImpactFrame(t.x, t.y, n.col);
                }
            }
        });

        if (Math.abs(n.x - player.x) > 1200) n.alive = false;
    });

    // Handle Particle System
    particles.forEach(p => {
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        ctx.fillStyle = p.color;
        let size = p.type === 'shatter' ? Math.max(1, (p.life/p.maxLife)*6) : Math.max(1, (p.life/p.maxLife)*4);
        ctx.fillRect(p.x - camX, p.y, size, size);
    });
    particles = particles.filter(p => p.life > 0);

    // Impact shock rings layout calculation
    impactFrames.forEach(f => {
        f.r += (f.maxR - f.r) * 0.12;
        f.opacity -= 0.05;
        ctx.strokeStyle = f.color;
        ctx.lineWidth = 3;
        ctx.save();
        ctx.globalAlpha = Math.max(0, f.opacity);
        ctx.beginPath();
        ctx.arc(f.x, f.y + 30, f.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    });
    impactFrames = impactFrames.filter(f => f.opacity > 0);

    if (shake > 0) ctx.restore();

    requestAnimationFrame(step);
}

populateRoster();
requestAnimationFrame(step);
</script>
